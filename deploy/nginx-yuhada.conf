server {
    listen 80;
    server_name yuhadahair.cafe24.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yuhadahair.cafe24.com;

    ssl_certificate     /etc/letsencrypt/live/yuhadahair.cafe24.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yuhadahair.cafe24.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Static files - nginx direct
    location /static/ {
        alias /opt/yuhada/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # App
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
